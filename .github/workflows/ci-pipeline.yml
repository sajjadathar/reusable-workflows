name: CI Pipeline
# Reusable workflow to be called from other workflows
on:
  workflow_call:
    inputs:
      run_unit_tests:
        description: "Run Unit Tests"
        required: false
        default: true
        type: boolean
      run_build:
        description: "Create Application image"
        required: false
        default: true
        type: boolean
      run_codeql:
        description: "Run CodeQL"
        required: false
        default: false
        type: boolean
      run_sonarqube:
        description: "Run SonarQL"
        required: false
        default: false
        type: boolean
      run_publish_dockerhub:
        description: "Run Publish Image to DockerHub"
        required: false
        default: false
        type: boolean
      run_publish-ghcr:
        description: "Run Publish Image to GHCR"
        required: false
        default: false
        type: boolean
    outputs:
      image-tag:
        description: "Docker image tag"
        value: ${{ jobs.build.outputs.image-tag }} 
        
    secrets:
      SONAR_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  unit-tests:
    if: ${{ inputs.run_unit_tests }}
    name: Running Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.3
      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with: 
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@eb1897b8dc4b5d5bfe39a428a8f2304605e0983c    # v7.0.0
      
      - name: Install Dependencies
        run: uv sync --frozen --no-build
      - name: Run Unit Test
        run: |
          mkdir -p reports/
          uv run --frozen pytest --junitxml=reports/unit-tests-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v
      - name: Upload Code Coverage Report
        uses: actions/upload-artifact@v7.0.0
        with: 
          name: unit-test-report
          path: reports/

  codeql:
    if: ${{ inputs.run_codeql }}
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: ['python']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
         language: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with: 
          strategy: "security"

  sonarqube:
    if: ${{ inputs.run_sonarqube }}
    name: SonarQube
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Download Coverage Report
        uses: actions/download-artifact@v7.0.0
        with:
          name: unit-test-report
          path: reports/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
      
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  
  build:
    if: ${{ success() && inputs.run_build }}
    name: Build Image
    runs-on: ubuntu-latest
    needs: [unit-tests, codeql, sonarqube]
    outputs:
      image-tag: ${{ steps.vars.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Generate Image Tag
        id: vars
        run: |
          IMAGE_TAG="${{ github.repository_id }}-${GITHUB_SHA::8}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build Image (no push)
        uses: docker/build-push-action@v7.2.0
        with: 
          context: .
          file: ./Dockerfile
          tags: github-actions-fastapi-app:${{ steps.vars.outputs.IMAGE_TAG }}
          push: false
          load: true
      - name: Save Docker Image as Artifact
        run: docker save github-actions-fastapi-app:${{ steps.vars.outputs.IMAGE_TAG }} -o github_actions_fastapi_app.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: github_actions_fastapi_app_image
          path: github_actions_fastapi_app.tar

  publish-dockerhub:
    if: ${{ inputs.run_publish_dockerhub }}
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download the Image
        uses: actions/download-artifact@v7.0.0
        with:
          name: github_actions_fastapi_app_image
          path: .
      - name: Load Docker Image
        run: docker load -i github_actions_fastapi_app.tar
      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Tag Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          docker image tag github-actions-fastapi-app:$IMAGE_TAG ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-fastapi-app:$IMAGE_TAG
      - name: Push Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          docker image push ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-fastapi-app:$IMAGE_TAG

  publish-ghcr:
    if: ${{ inputs.run_publish-ghcr }}
    name: Publish to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download the Image
        uses: actions/download-artifact@v7.0.0
        with:
          name: github_actions_fastapi_app_image
          path: .
      - name: Load Docker Image
        run: docker load -i github_actions_fastapi_app.tar

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub automatically creates a GITHUB_TOKEN secret to use in your workflow.
      - name: Tag Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          docker image tag github-actions-fastapi-app:$IMAGE_TAG ghcr.io/${{ github.repository_owner }}/github-actions-fastapi-app:$IMAGE_TAG
      - name: Push Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          docker image push ghcr.io/${{ github.repository_owner }}/github-actions-fastapi-app:$IMAGE_TAG
        
